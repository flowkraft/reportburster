# Groovy DSL base classes must be loaded by the base classloader (not RestartClassLoader)
# because GroovyClassLoader parses scripts that extend these classes. If they're in different
# classloaders, ClassCastException occurs. This was not needed when these classes lived in
# rb-common (dependency jars use base classloader by default), but after Phase 4 moved them
# to rb-server (application classes), DevTools loads them via RestartClassLoader.
restart.exclude.dsl-tabulator=com/flowkraft/reporting/dsl/tabulator/
restart.exclude.dsl-chart=com/flowkraft/reporting/dsl/chart/
restart.exclude.dsl-pivottable=com/flowkraft/reporting/dsl/pivottable/
restart.exclude.dsl-filterpane=com/flowkraft/reporting/dsl/filterpane/
restart.exclude.analytics-engine=com/flowkraft/analytics/engine/
