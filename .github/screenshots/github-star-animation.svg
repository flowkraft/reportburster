<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 150" width="510" height="150" text-rendering="optimizeLegibility" shape-rendering="geometricPrecision">
  <defs>
    <style>
      @keyframes moveCursor {
        0%   { transform: translate(400px, 95px); }
        20%  { transform: translate(255px, 66px); }
        85%  { transform: translate(255px, 66px); }
        95%  { transform: translate(400px, 95px); }
        100% { transform: translate(400px, 95px); }
      }
      @keyframes showArrow {
        0%   { opacity: 1; }
        19%  { opacity: 1; }
        20%  { opacity: 0; }
        94%  { opacity: 0; }
        95%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes showHand {
        0%   { opacity: 0; }
        19%  { opacity: 0; }
        20%  { opacity: 1; }
        85%  { opacity: 1; }
        86%  { opacity: 0; }
        100% { opacity: 0; }
      }
      @keyframes hideOnClick {
        0%   { opacity: 1; }
        34%  { opacity: 1; }
        35%  { opacity: 0; }
        90%  { opacity: 0; }
        91%  { opacity: 1; }
        100% { opacity: 1; }
      }
      @keyframes showOnClick {
        0%   { opacity: 0; }
        34%  { opacity: 0; }
        35%  { opacity: 1; }
        90%  { opacity: 1; }
        91%  { opacity: 0; }
        100% { opacity: 0; }
      }
      @keyframes btnBg {
        0%   { fill: #21262d; }
        34%  { fill: #21262d; }
        35%  { fill: #2d333b; }
        90%  { fill: #2d333b; }
        91%  { fill: #21262d; }
        100% { fill: #21262d; }
      }
      @keyframes btnBorder {
        0%   { stroke: #30363d; }
        34%  { stroke: #30363d; }
        35%  { stroke: #e3b341; }
        90%  { stroke: #e3b341; }
        91%  { stroke: #30363d; }
        100% { stroke: #30363d; }
      }
      .cursor-wrap  { animation: moveCursor 5s ease-in-out infinite; }
      .arrow        { animation: showArrow 5s ease-in-out infinite; }
      .hand         { animation: showHand 5s ease-in-out infinite; }
      .before-click { animation: hideOnClick 5s ease-in-out infinite; }
      .after-click  { animation: showOnClick 5s ease-in-out infinite; }
      .star-btn-bg  { animation: btnBg 5s ease-in-out infinite; }
      .star-btn-rect{ animation: btnBorder 5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="510" height="150" rx="10" fill="#0d1117"/>

  <!-- Repo icon + name -->
  <g transform="translate(20, 12)">
    <path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8V1.5z" fill="#8b949e" transform="translate(0, 3) scale(1.1)"/>
    <text x="22" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" font-weight="600">flowkraft</text>
    <text x="130" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e" font-weight="400">/</text>
    <text x="140" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#58a6ff" font-weight="600">datapallas</text>
  </g>

  <!-- === BUTTON ROW === -->
  <!-- Watch button -->
  <g transform="translate(20, 42)">
    <rect width="96" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <g transform="translate(10, 6)">
      <path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 010 1.798c-.45.678-1.367 1.932-2.637 3.023C11.67 13.008 9.981 14 8 14c-1.981 0-3.671-.992-4.933-2.078C1.797 10.831.88 9.577.43 8.899a1.62 1.62 0 010-1.798c.45-.678 1.367-1.932 2.637-3.023C4.33 2.992 6.019 2 8 2zM1.679 8.451a.12.12 0 000 .098c.42.63 1.258 1.783 2.399 2.763C5.254 12.3 6.655 13 8 13s2.746-.7 3.922-1.688c1.14-.98 1.979-2.133 2.399-2.763a.12.12 0 000-.098c-.42-.63-1.258-1.783-2.399-2.763C10.746 4.7 9.345 4 8 4s-2.746.7-3.922 1.688c-1.14.98-1.979 2.133-2.399 2.763zM8 10a2 2 0 11-.001-3.999A2 2 0 018 10z" fill="#c9d1d9" transform="scale(0.82)"/>
    </g>
    <text x="26" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600">Watch</text>
    <line x1="74" y1="0" x2="74" y2="28" stroke="#30363d" stroke-width="1"/>
    <text x="85" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600" text-anchor="middle">1</text>
  </g>

  <!-- Fork button -->
  <g transform="translate(126, 42)">
    <rect width="86" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <g transform="translate(10, 5)">
      <path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z" fill="#c9d1d9" transform="scale(0.82)"/>
    </g>
    <text x="26" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600">Fork</text>
    <line x1="66" y1="0" x2="66" y2="28" stroke="#30363d" stroke-width="1"/>
    <text x="76" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600" text-anchor="middle">0</text>
  </g>

  <!-- Star button (animated) -->
  <g transform="translate(222, 42)">
    <rect class="star-btn-bg star-btn-rect" width="88" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <!-- Star outline (before click) -->
    <g class="before-click" transform="translate(10, 6)">
      <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25zm0 2.445L6.615 5.5a.75.75 0 01-.564.41l-3.097.45 2.24 2.184a.75.75 0 01.216.664l-.528 3.084 2.769-1.456a.75.75 0 01.698 0l2.77 1.456-.53-3.084a.75.75 0 01.216-.664l2.24-2.183-3.096-.45a.75.75 0 01-.564-.41L8 2.694z" fill="#c9d1d9" transform="scale(0.82)"/>
    </g>
    <!-- Star filled gold (after click) -->
    <g class="after-click" transform="translate(10, 6)">
      <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z" fill="#e3b341" transform="scale(0.82)"/>
    </g>
    <text class="before-click" x="28" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600">Star</text>
    <text class="after-click" x="28" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#e3b341" font-weight="600">Starred</text>
    <line x1="68" y1="0" x2="68" y2="28" stroke="#30363d" stroke-width="1"/>
    <text class="before-click" x="78" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600" text-anchor="middle">22</text>
    <text class="after-click" x="78" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#c9d1d9" font-weight="600" text-anchor="middle">23</text>
  </g>

  <!-- Call to action -->
  <text x="20" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#8b949e" font-weight="400">We're just a (new) baby project — help us grow up!</text>

  <!-- Tagline -->
  <text x="20" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#e3b341" font-weight="600">Spread the word that open-source BI is awesome!</text>

  <!-- === ANIMATED CURSOR === -->
  <g class="cursor-wrap">
    <!-- Arrow pointer (standard Windows cursor) -->
    <g class="arrow">
      <path d="M0,0 L0,17 L4.5,13 L7.5,20 L10.5,18.5 L7.5,12 L12,12 Z" fill="white" stroke="#000" stroke-width="1.2" stroke-linejoin="miter"/>
    </g>
    <!-- Hand pointer (index finger pointing up) -->
    <g class="hand">
      <g transform="translate(-5, -1) scale(1.3)">
        <!-- Palm and fingers -->
        <path d="M7 1c0-1.1 1.8-1.1 1.8 0v6h0.2V5.2c0-1 1.5-1 1.5 0V7.5h0.2V5.8c0-1 1.5-1 1.5 0V7.8h0.2V6.5c0-1 1.4-1 1.4 0v3c0 3.2-1.5 5.5-4.3 5.5H9c-2 0-3.5-1.2-4.2-2.8L3.2 8.8C2.8 8 3.5 7.2 4.3 7.5L7 8.5Z" fill="white" stroke="#000" stroke-width="0.7" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
